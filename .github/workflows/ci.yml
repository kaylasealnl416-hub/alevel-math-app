name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: 前端 (Lint + TypeCheck + Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔍 ESLint 代码规范检查
        run: npm run lint

      - name: 🔷 TypeScript 类型检查
        run: npm run typecheck

      - name: 🧪 Vitest 单元测试
        run: npm test

      - name: 🏗️ 构建验证（vite build）
        run: npm run build

  backend:
    name: 后端 (Bun 单元测试)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🥟 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 安装依赖
        run: bun install --frozen-lockfile

      - name: 🧪 Bun 单元测试
        run: bun test tests/unit
